name: CursorVoice
options:
  bundleIdPrefix: com.cursorvoice
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.7.7"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
targets:
  CursorVoice:
    type: application
    platform: macOS
    sources:
      - path: Sources/CursorVoice
        excludes:
          - "Info.plist"
          - "CursorVoice.entitlements"
    resources:
      - path: Sources/CursorVoice/Assets.xcassets
    info:
      path: Sources/CursorVoice/Info.plist
      properties:
        CFBundleName: CursorVoice
        CFBundleDisplayName: Cursor Voice
        CFBundleIdentifier: com.cursorvoice.app
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: ""
        NSMicrophoneUsageDescription: "Cursor Voice listens to your voice so you can talk to the assistant."
        NSSpeechRecognitionUsageDescription: "Cursor Voice uses on-device speech recognition to detect the wake word."
        NSAppleEventsUsageDescription: "Cursor Voice runs AppleScript to perform tasks across your apps."
        NSDesktopFolderUsageDescription: "Cursor Voice may save screenshots for the assistant to read."
        NSDocumentsFolderUsageDescription: "Cursor Voice may read files you ask the assistant about."
    entitlements:
      path: Sources/CursorVoice/CursorVoice.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
        com.apple.security.automation.apple-events: true
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cursorvoice.app
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Sources/CursorVoice/CursorVoice.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
